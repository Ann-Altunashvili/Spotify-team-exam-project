<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spitify - exam group project</title>
    <link rel="stylesheet" href="/assets/fonts/fonts.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <!-- Khatia -->
    <!-- desctop header -->
    <header></header>

    <!-- Khatia -->
    <!-- sidebar -->
    <aside></aside>


    <!-- Main section -->
    <!-- Nodari -->
    <main>

        <!-- Home section -->



    </main>

    <!-- footer player -->
    <!-- Ani -->
    <footer class="footer-player">
<!--Player left section-->
        <section class="player-left">
            <div class="left-side-icons">
                <button class="btn-play" aria-label="Play">
                    <img src="./assets/icons/player-icons/player-playing-icon.svg" alt="Play">
                </button>

                <button class="btn-icon" aria-label="Previous">
                    <img src="./assets/icons/player-icons/player-left-arrow.svg" alt="Previous" class="btn-icon__svg">
                </button>
                <button class="btn-icon" aria-label="Next">
                    <img src="./assets/icons/player-icons/player-right-arrow.svg" alt="Next" class="btn-icon__svg">
                </button>
                <button class="btn-icon" aria-label="Shuffle">
                    <img src="./assets/icons/player-icons/player-shuffle-icon.svg" alt="Shuffle"
                        class="btn-icon__svg btn-icon__svg--active">
                </button>
                <button class="btn-icon" aria-label="Repeat">
                    <img src="./assets/icons/player-icons/player-resume-icon.svg" alt="Repeat" class="btn-icon__svg">
                </button>
            </div>
        </section>
<!--Player center section-->
        <section class="player-center">

            <div class="progress-container">
                <time class="player-time">2:23</time>

                <img class="player__progresss-line" src="./assets/icons/player-icons/player-line.svg"
                    alt="progress line">

                <time class="player-time">4:45</time>

                <button class="voice-btn" aria-label="Voice Control">
                    <img src="./assets/icons/player-icons/player-voice-icon.svg" alt="Voice control"
                        class="btn-icon__svg">
                </button>
            </div>
        </section>
<!--Player right section-->
        <section class="player-right">
            <div class="extra-controls">
                <div class="mini-track">
                    <img src="./assets/icons/player-icons/player-album-icon.svg" alt="Get Lucky Cover"
                        class="mini-track__img">
                    <div class="mini-track__text">
                        <h4 class="mini-track__title">Get Lucky</h4>
                        <p class="mini-track__artist">Daft Punk</p>
                        <p class="mini-track__album">Random Access Memories</p>
                    </div>
                </div>

                <div class="action-icons">
                    <button class="btn-icon">
                        <img src="./assets/icons/player-icons/player-heart-icon.svg" alt="Like" class="btn-icon__svg">
                    </button>
                    <button class="btn-icon">
                        <img src="./assets/icons/player-icons/player-square-icon.svg" alt="Add" class="btn-icon__svg">
                    </button>
                    <button class="btn-icon">
                        <img src="./assets/icons/player-icons/player-music-icon.svg" alt="Microphone"
                            class="btn-icon__svg">
                    </button>
                    <button class="btn-icon">
                        <img src="./assets/icons/player-icons/player-mobiles-icon.svg" alt="Layer Group"
                            class="btn-icon__svg">
                    </button>
                    <button class="btn-icon">
                        <img src="./assets/icons/player-icons/player-dots-icon.svg" alt="Dots"
                            class="btn-icon__svg">
                    </button>
                    <button class="btn-icon">
                        <img src="./assets/icons/player-icons/player-blue-icon.svg" alt="blue profile"
                            class="btn-icon__svg">
                    </button>
                    <button class="btn-icon">
                        <img src="./assets/icons/player-icons/player-burger-icon.svg" alt="burger icon"
                            class="btn-icon__svg">
                    </button>
                </div>
            </div>
        </section>

    </footer>
</body>

</html>
